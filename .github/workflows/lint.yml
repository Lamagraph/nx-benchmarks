name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.10"
      - run: uv sync --no-group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy .
